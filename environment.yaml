name: rs-class-env
channels:
  - conda-forge
  - nodefaults  # 关键：彻底屏蔽默认频道，防止依赖冲突
dependencies:
  # 基础环境
  - python=3.10
  - jupyterlab
  - ipykernel
  
  # 核心科学计算与数据处理
  - numpy
  - pandas
  - scipy
  
  # 遥感与空间分析核心库
  - gdal
  - geopandas
  - rasterio
  - shapely
  - cartopy
  - pygmt
  
  # 图像处理与机器学习
  - scikit-image
  - scikit-learn
  - arosics
  
  # 可视化工具
  - matplotlib
  - folium
  - panel
  - holoviews
  
  # 云原生遥感数据访问
  - pystac-client
  - planetary-computer